<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --bg-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --border-color: #333333;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 30px rgba(59, 130, 246, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .file-input-wrapper {
            margin-top: 15px;
            position: relative;
        }

        .file-input {
            display: none;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .file-input-label:hover {
            border-color: var(--accent-primary);
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .file-input-label svg {
            width: 18px;
            height: 18px;
        }

        .current-file {
            margin-top: 12px;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .current-file-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .rounds-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .round-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .round-item:hover {
            background: var(--bg-hover);
            border-left-color: var(--accent-primary);
        }

        .round-item.active {
            background: var(--bg-hover);
            border-left-color: var(--accent-secondary);
        }

        .round-number {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .round-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .round-preview {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 主聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }

        .chat-title {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .chat-action-btn {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .chat-action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* 消息列表 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .message-group {
            margin-bottom: 24px;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .message.assistant .message-avatar {
            background: var(--accent-gradient);
        }

        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            position: relative;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* 代码块样式 */
        .code-block {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin: 12px 0;
            overflow: hidden;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .code-lang {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .code-copy {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: var(--transition);
        }

        .code-copy:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .code-content {
            padding: 14px;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #e0e0e0;
        }

        /* 折叠面板 */
        .collapsible {
            margin: 12px 0;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .collapsible-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .collapsible-header:hover {
            background: var(--bg-hover);
        }

        .collapsible-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .collapsible-icon {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .collapsible.expanded .collapsible-icon {
            transform: rotate(90deg);
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .collapsible.expanded .collapsible-content {
            max-height: 2000px;
        }

        .collapsible-inner {
            padding: 16px;
            background: var(--bg-primary);
        }

        /* JSON 预览 */
        .json-preview {
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .json-key {
            color: #9cdcfe;
        }

        .json-string {
            color: #ce9178;
        }

        .json-number {
            color: #b5cea8;
        }

        .json-boolean {
            color: #569cd6;
        }

        /* 工具调用卡片 */
        .tool-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin: 8px 0;
            overflow: hidden;
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(59, 130, 246, 0.1);
            border-bottom: 1px solid var(--border-color);
        }

        .tool-icon {
            width: 20px;
            height: 20px;
            color: var(--accent-primary);
        }

        .tool-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .tool-content {
            padding: 14px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            max-width: 300px;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -300px;
                height: 100%;
                z-index: 100;
            }

            .sidebar.open {
                left: 0;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-title">对话查看器</h1>
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" class="file-input" accept=".json">
                    <label for="fileInput" class="file-input-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        选择对话文件
                    </label>
                </div>
                <div class="current-file" id="currentFile">
                    <div class="current-file-label">当前文件</div>
                    <div id="currentFileName">未选择文件</div>
                </div>
            </div>
            <div class="rounds-list" id="roundsList">
                <!-- 动态生成 -->
            </div>
        </aside>

        <!-- 主聊天区域 -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-avatar">AI</div>
                    <div>
                        <div class="chat-title">AI 助手对话</div>
                        <div class="chat-subtitle" id="chatSubtitle">选择文件开始查看</div>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="chat-action-btn" id="expandAllBtn">展开全部</button>
                    <button class="chat-action-btn" id="collapseAllBtn">折叠全部</button>
                </div>
            </header>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <div class="empty-title">开始查看对话</div>
                    <div class="empty-desc">从左侧选择一个对话文件，或点击"选择对话文件"按钮加载 JSON 文件</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 全局状态
        let currentData = null;
        let currentFilePath = '';

        // DOM 元素
        const fileInput = document.getElementById('fileInput');
        const currentFileName = document.getElementById('currentFileName');
        const roundsList = document.getElementById('roundsList');
        const messagesContainer = document.getElementById('messagesContainer');
        const chatSubtitle = document.getElementById('chatSubtitle');
        const expandAllBtn = document.getElementById('expandAllBtn');
        const collapseAllBtn = document.getElementById('collapseAllBtn');

        // 文件选择事件
        fileInput.addEventListener('change', handleFileSelect);

        // 展开/折叠全部
        expandAllBtn.addEventListener('click', () => toggleAllCollapsible(true));
        collapseAllBtn.addEventListener('click', () => toggleAllCollapsible(false));

        // 处理文件选择
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    currentData = JSON.parse(event.target.result);
                    currentFileName.textContent = file.name;
                    renderRoundsList();
                    
                    // 默认显示第一轮
                    if (currentData && currentData.length > 0) {
                        loadRound(0);
                    }
                } catch (error) {
                    alert('文件解析失败: ' + error.message);
                }
            };
            reader.readAsText(file);
        }

        // 渲染轮次列表
        function renderRoundsList() {
            roundsList.innerHTML = '';
            if (!currentData || !Array.isArray(currentData)) return;

            currentData.forEach((round, index) => {
                const item = document.createElement('div');
                item.className = 'round-item';
                item.dataset.index = index;
                
                const timestamp = round.timestamp || '未知时间';
                const preview = getRoundPreview(round);
                
                item.innerHTML = `
                    <div class="round-number">Round ${round.round_number || index + 1}</div>
                    <div class="round-time">${timestamp}</div>
                    <div class="round-preview">${preview}</div>
                `;
                
                item.addEventListener('click', () => loadRound(index));
                roundsList.appendChild(item);
            });
        }

        // 获取轮次预览
        function getRoundPreview(round) {
            if (!round.client_request || !round.client_request.messages) return '无消息';
            
            const lastMessage = round.client_request.messages[round.client_request.messages.length - 1];
            if (typeof lastMessage.content === 'string') {
                return lastMessage.content.substring(0, 50) + '...';
            }
            return '[复杂内容]';
        }

        // 加载指定轮次
        function loadRound(index) {
            if (!currentData || !currentData[index]) return;

            // 更新侧边栏选中状态
            document.querySelectorAll('.round-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            const round = currentData[index];
            chatSubtitle.textContent = `Round ${round.round_number || index + 1} · ${round.timestamp || ''}`;

            // 渲染消息
            renderMessages(round);
        }

        // 渲染消息
        function renderMessages(round) {
            messagesContainer.innerHTML = '';

            // 渲染历史消息（折叠）
            if (round.client_request && round.client_request.messages) {
                const messages = round.client_request.messages;
                const historyMessages = messages.slice(0, -1);
                const currentMessage = messages[messages.length - 1];

                // 如果有历史消息，显示折叠面板
                if (historyMessages.length > 0) {
                    const historyPanel = createCollapsible('历史上下文', renderHistoryMessages(historyMessages));
                    messagesContainer.appendChild(historyPanel);
                }

                // 渲染当前用户消息
                if (currentMessage) {
                    renderUserMessage(currentMessage, round.timestamp);
                }
            }

            // 渲染助手回复
            if (round.server_response) {
                renderAssistantMessage(round.server_response);
            }
        }

        // 创建折叠面板
        function createCollapsible(title, content) {
            const div = document.createElement('div');
            div.className = 'collapsible';
            div.innerHTML = `
                <div class="collapsible-header">
                    <div class="collapsible-title">
                        <svg class="collapsible-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                        ${title}
                    </div>
                    <span style="font-size: 11px; color: var(--text-muted);">点击展开</span>
                </div>
                <div class="collapsible-content">
                    <div class="collapsible-inner">
                        ${content}
                    </div>
                </div>
            `;

            div.querySelector('.collapsible-header').addEventListener('click', () => {
                div.classList.toggle('expanded');
            });

            return div;
        }

        // 渲染历史消息
        function renderHistoryMessages(messages) {
            return messages.map(msg => {
                const role = msg.role === 'user' ? '用户' : '助手';
                const content = typeof msg.content === 'string' 
                    ? escapeHtml(msg.content)
                    : '<code>' + escapeHtml(JSON.stringify(msg.content, null, 2)) + '</code>';
                
                return `<div style="margin-bottom: 12px; padding: 10px; background: var(--bg-tertiary); border-radius: var(--radius-sm);">
                    <div style="font-size: 11px; color: var(--accent-primary); margin-bottom: 6px; font-weight: 600;">${role}</div>
                    <div style="font-size: 13px; color: var(--text-secondary);">${content}</div>
                </div>`;
            }).join('');
        }

        // 渲染用户消息
        function renderUserMessage(message, timestamp) {
            const content = typeof message.content === 'string'
                ? escapeHtml(message.content)
                : escapeHtml(JSON.stringify(message.content, null, 2));

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-group';
            messageDiv.innerHTML = `
                <div class="message user">
                    <div class="message-avatar">U</div>
                    <div class="message-content">
                        <div class="message-bubble">${formatContent(content)}</div>
                        <div class="message-time">${timestamp || ''}</div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
        }

        // 渲染助手消息
        function renderAssistantMessage(response) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-group';

            let contentHtml = '';

            // 处理 content 数组
            if (response.content && Array.isArray(response.content)) {
                response.content.forEach(item => {
                    if (item.type === 'text' && item.text) {
                        contentHtml += `<div class="message-bubble">${formatContent(escapeHtml(item.text))}</div>`;
                    } else if (item.type === 'tool_use') {
                        contentHtml += renderToolUse(item);
                    }
                });
            } else if (typeof response.content === 'string') {
                contentHtml += `<div class="message-bubble">${formatContent(escapeHtml(response.content))}</div>`;
            }

            messageDiv.innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        ${contentHtml}
                        <div class="message-time">${response.model || ''} · ${response.stop_reason || ''}</div>
                    </div>
                </div>
            `;

            messagesContainer.appendChild(messageDiv);

            // 渲染工具结果（如果有）
            if (response.tool_results && response.tool_results.length > 0) {
                response.tool_results.forEach(result => {
                    const toolResultDiv = document.createElement('div');
                    toolResultDiv.className = 'message-group';
                    toolResultDiv.innerHTML = `
                        <div class="message assistant">
                            <div class="message-avatar">🔧</div>
                            <div class="message-content">
                                <div class="tool-card">
                                    <div class="tool-header">
                                        <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                                        </svg>
                                        <span class="tool-name">工具结果</span>
                                    </div>
                                    <div class="tool-content">
                                        <pre class="json-preview">${syntaxHighlight(JSON.stringify(result, null, 2))}</pre>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    messagesContainer.appendChild(toolResultDiv);
                });
            }
        }

        // 渲染工具调用
        function renderToolUse(tool) {
            return `
                <div class="tool-card">
                    <div class="tool-header">
                        <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                        </svg>
                        <span class="tool-name">${escapeHtml(tool.name)}</span>
                    </div>
                    <div class="tool-content">
                        <pre class="json-preview">${syntaxHighlight(JSON.stringify(tool.input, null, 2))}</pre>
                    </div>
                </div>
            `;
        }

        // 格式化内容（处理代码块等）
        function formatContent(text) {
            // 处理代码块
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<div class="code-block">
                    <div class="code-header">
                        <span class="code-lang">${lang || 'code'}</span>
                        <button class="code-copy" onclick="copyCode(this)">复制</button>
                    </div>
                    <div class="code-content">${escapeHtml(code.trim())}</div>
                </div>`;
            });

            // 处理行内代码
            text = text.replace(/`([^`]+)`/g, '<code style="background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px;">$1</code>');

            // 处理换行
            text = text.replace(/\n/g, '<br>');

            return text;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // JSON 语法高亮
        function syntaxHighlight(json) {
            json = escapeHtml(json);
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // 复制代码
        function copyCode(btn) {
            const code = btn.closest('.code-block').querySelector('.code-content').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }

        // 展开/折叠所有面板
        function toggleAllCollapsible(expand) {
            document.querySelectorAll('.collapsible').forEach(el => {
                el.classList.toggle('expanded', expand);
            });
        }

        // 自动加载默认文件（如果存在）
        window.addEventListener('DOMContentLoaded', () => {
            // 可以在这里添加默认文件加载逻辑
        });
    </script>
</body>
</html>
